name: CI/CD Backend

on:
  push:
    branches:
      - development
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test   # 👈 THIS IS THE GATE

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ github.ref == 'refs/heads/development' && secrets.DEV_HOST || secrets.PROD_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ github.ref == 'refs/heads/development' && secrets.DEV_SSH_KEY || secrets.PROD_SSH_KEY }}
          script: |
            cd /backend/catalystcare_be
            git pull origin ${GITHUB_REF##*/}
            docker compose up -d --build