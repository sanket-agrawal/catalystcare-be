name: Backend CI/CD

on:
  push:
    branches:
      - development
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ github.ref == 'refs/heads/development' && secrets.DEV_HOST || secrets.PROD_HOST }}

          username: ${{ secrets.SSH_USER }}

          key: ${{ github.ref == 'refs/heads/development' && secrets.DEV_SSH_KEY || secrets.PROD_SSH_KEY }}

          script: |
            set -e

            cd /home/public/catalystcare-be

            echo "Pulling latest code..."

            git fetch origin

            git reset --hard origin/${GITHUB_REF##*/}

            echo "Rebuilding containers..."

            docker compose up -d --build

            echo "Cleaning unused Docker images..."

            docker image prune -af

            echo "Deployment completed."